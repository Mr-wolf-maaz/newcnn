version: '3.8'
services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chitral
      POSTGRES_PASSWORD: chitral_secure_pass
      POSTGRES_DB: chitral_nuts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://chitral:chitral_secure_pass@db:5432/chitral_nuts
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: your-super-secret-change-in-production
    depends_on:
      - db

volumes:
  postgres_data:
